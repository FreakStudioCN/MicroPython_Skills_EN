[flake8]
max-line-length = 120
builtins =
    const,
    micropython,
    ptr,
    ptr8,
    ptr16,
    ptr32,
    uint,
    int8,
    int16,
    int32,
    mem8,
    mem16,
    mem32,
    asm_pio,
    wrap_target,
    wrap,
    label,
    word,
    jmp,
    irq,
    out,
    in_,
    push,
    pull,
    mov,
    set,
    wait,
    nop,
    side
select =
    E9,
    F63,
    F7,
    F82
extend-ignore =
    E203,
    W503
per-file-ignores =
    __init__.py:F401
    */rp2_*.py:F821
    */*_pio.py:F821
